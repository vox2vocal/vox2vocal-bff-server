syntax = "proto3";

package gateway;

service GatewayService {
  rpc SignUp(SignUpRequest) returns (AuthTokenResponse);
  rpc Login(LoginRequest) returns (AuthTokenResponse);
  rpc RefreshSession(RefreshSessionRequest) returns (AuthTokenResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  rpc GetCurrentUser(GetCurrentUserRequest) returns (UserResponse);
  rpc CreateAudioUploadSession(CreateAudioUploadSessionRequest) returns (CreateAudioUploadSessionResponse);
}

message SignUpRequest {
  string email = 1;
  string password = 2;
  string display_name = 3;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message GetCurrentUserRequest {
  string access_token = 1;
}

message RefreshSessionRequest {
  string refresh_token = 1;
}

message LogoutRequest {
  string refresh_token = 1;
}

message LogoutResponse {
  bool ok = 1;
  string status = 2;
}

message CreateAudioUploadSessionRequest {
  string access_token = 1;
  string original_filename = 2;
  string content_type = 3;
}

message CreateAudioUploadSessionResponse {
  string audio_asset_id = 1;
  string bucket = 2;
  string source_object_key = 3;
  string upload_url = 4;
  string method = 5;
  map<string, string> headers = 6;
  int32 expires_in = 7;
  string expires_at = 8;
  string idempotency_key = 9;
}

message AuthTokenResponse {
  string access_token = 1;
  string refresh_token = 2;
  int32 expires_in = 3;
  UserResponse user = 4;
  int32 refresh_expires_in = 5;
}

message UserResponse {
  string id = 1;
  string email = 2;
  string display_name = 3;
  string role = 4;
}
